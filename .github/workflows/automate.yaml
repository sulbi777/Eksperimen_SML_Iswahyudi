name: Automate Data Preprocessing

on:
  push:
    branches: [ "main" ]
    # Workflow ini akan berjalan jika ada perubahan di folder raw atau script preprocessing
    paths:
      - 'namadataset_raw/**'
      - 'preprocessing/**'
  workflow_dispatch: # Memungkinkan Anda menjalankan workflow secara manual dari tombol di GitHub

jobs:
  build_and_preprocess:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        
      - name: Set up Python 3.12.7
        uses: actions/setup-python@v4
        with:
          python-version: '3.12.7'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Install library yang dibutuhkan (bisa juga via pip install -r requirements.txt)
          pip install pandas numpy scikit-learn
          
      - name: Run Preprocessing Script
        run: |
          python preprocessing/automate_iswahyudi.py
          
      - name: Commit and Push Preprocessed Data
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add namadataset_preprocessing/
          # Commit jika ada perubahan, lewati jika tidak ada
          git commit -m "Auto-update preprocessed data via GitHub Actions" || echo "No changes to commit"
          git push
